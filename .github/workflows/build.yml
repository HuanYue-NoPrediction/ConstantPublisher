name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 生成 Windows 平台壳(仓库只存 Dart 源码)
        run: flutter create . --platforms=windows --project-name dst_mod_publisher

      - name: 拉取依赖
        run: flutter pub get

      - name: 生成应用图标(exe / 任务栏)
        run: dart run flutter_launcher_icons

      - name: 构建 Release
        run: flutter build windows --release

      - name: 构建 Steamworks 助手(C#,自包含单文件)
        run: dotnet publish helper/CpSteamHelper.csproj -c Release -o helper_out

      - name: 合并助手到发布目录(含 Valve 原生库)
        run: |
          New-Item -ItemType Directory -Force build/windows/x64/runner/Release/helper | Out-Null
          Copy-Item helper_out/* build/windows/x64/runner/Release/helper -Recurse -Force
          # 显式拷贝 steam_api64.dll —— 单文件 publish 不保证带出它,必须确定性放置
          Copy-Item helper/native/steam_api64.dll build/windows/x64/runner/Release/helper/ -Force
          if (-not (Test-Path build/windows/x64/runner/Release/helper/steam_api64.dll)) { throw 'steam_api64.dll 缺失!' }

      - name: 写入版本号
        run: |
          $v = (Select-String -Path pubspec.yaml -Pattern '^version:').Line.Split(':')[1].Trim()
          Set-Content -Path build/windows/x64/runner/Release/version.txt -Value $v -Encoding ascii

      - name: 打包
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath DSTModPublisher-windows.zip

      - name: 上传构建产物(每次推送都有)
        uses: actions/upload-artifact@v4
        with:
          name: DSTModPublisher-windows
          path: DSTModPublisher-windows.zip

      - name: 发布 Release(推送 v* 标签时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DSTModPublisher-windows.zip
            build/windows/x64/runner/Release/version.txt

  # 实验性:未签名 macOS 包,用于验证 Steamworks 发布链路(尤其 appid 245850 能否 init)
  macos:
    runs-on: macos-14 # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 生成 macOS 平台壳
        run: flutter create . --platforms=macos --project-name dst_mod_publisher

      - name: 关闭 App Sandbox(否则无法拉起 helper 子进程 / 连 Steam)
        run: |
          for f in macos/Runner/*.entitlements; do
            /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" "$f" || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.disable-library-validation bool true" "$f" || true
          done

      - name: 拉取依赖
        run: flutter pub get

      - name: 构建 Release
        run: flutter build macos --release

      - name: 构建 Steamworks 助手(osx-arm64,文件夹式自包含)
        # 改为文件夹式:单文件模式下无法把补丁后的 Steamworks.NET 放进 bundle,故用文件夹部署
        run: >
          dotnet publish helper/CpSteamHelper.csproj -c Release -r osx-arm64
          --self-contained true -p:PublishSingleFile=false
          -p:IncludeNativeLibrariesForSelfExtract=false -o helper_out

      - name: 修补 Steamworks.NET 为 arm64
        # Steamworks.NET 的 NuGet 包只有 osx-x64(PE 头标记 x64),arm64 进程加载器拒收,
        # 原来的单文件助手因此一启动就崩。打补丁把 Machine 字段改成 arm64(纯 IL,安全)。
        run: python3 helper/patch_steamworks.py helper_out/Steamworks.NET.dll

      - name: 合并助手到 .app 内(含 libsteam_api.dylib)
        run: |
          APP="build/macos/Build/Products/Release/dst_mod_publisher.app"
          DEST="$APP/Contents/MacOS/helper"
          mkdir -p "$DEST"
          cp -R helper_out/* "$DEST/"
          cp helper/native/libsteam_api.dylib "$DEST/"
          chmod +x "$DEST/CpSteamHelper"
          test -f "$DEST/libsteam_api.dylib" || (echo 'dylib 缺失!' && exit 1)
          # 对 .app 做 ad-hoc 签名(Apple 芯片要求 arm64 至少有签名才能运行)
          codesign --force --deep --sign - "$APP"

      - name: 打包(zip 保留 .app 结构与可执行位)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent dst_mod_publisher.app "$GITHUB_WORKSPACE/DSTModPublisher-macos.zip"

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: DSTModPublisher-macos
          path: DSTModPublisher-macos.zip

      - name: 发布 Release(推送 v* 标签时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DSTModPublisher-macos.zip

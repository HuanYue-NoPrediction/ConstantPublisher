name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 生成 Windows 平台壳(仓库只存 Dart 源码)
        run: flutter create . --platforms=windows --project-name constant_publisher

      - name: 拉取依赖
        run: flutter pub get

      - name: 构建 Release
        run: flutter build windows --release

      - name: 打包
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ConstantPublisher-windows.zip

      - name: 上传构建产物(每次推送都有)
        uses: actions/upload-artifact@v4
        with:
          name: ConstantPublisher-windows
          path: ConstantPublisher-windows.zip

      - name: 发布 Release(推送 v* 标签时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ConstantPublisher-windows.zip
